<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTITY LOG | Terminal Access</title>
    <style>
        :root {
            --bg-deep: #020202;
            --bg-surface: #0a0a0a;
            --accent-red: #bb0000;
            --text-main: #ffffff;
            --text-muted: #666;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: var(--font-mono); 
            overflow: hidden; /* Verhindert Scrollen auf der Startseite */
        }

        /* CRT Glitch Effekt */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 10000; pointer-events: none; opacity: 0.2;
        }

        /* --- STARTSEITE (GATEKEEPER) --- */
        #landing-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            z-index: 500;
            position: relative;
        }

        .terminal-loader {
            color: var(--accent-red);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            text-align: left;
            width: 100%;
            max-width: 300px;
        }

        .enter-btn {
            background: transparent;
            border: 2px solid var(--accent-red);
            color: var(--accent-red);
            padding: 1.5rem 3rem;
            font-size: 1.5rem;
            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(187, 0, 0, 0.2);
        }

        .enter-btn:active {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 0 30px var(--accent-red);
        }

        /* --- HAUPTSEITE (DATABASE) --- */
        #main-content {
            display: none; /* Versteckt bis zum Klick */
            height: 100vh;
            overflow-y: auto;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }

        header { border-bottom: 2px solid var(--accent-red); margin-bottom: 2rem; padding-bottom: 1rem; }
        .filter-nav { display: flex; gap: 8px; margin-bottom: 2rem; overflow-x: auto; padding-bottom: 10px; }
        .filter-btn { 
            background: #111; border: 1px solid #333; color: #888; 
            padding: 12px 18px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem;
            white-space: nowrap; font-family: var(--font-mono);
        }
        .filter-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #222; cursor: pointer; }
        .card-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #222; }
        .card-body { padding: 15px; }
        .log-tag { color: var(--accent-red); font-size: 0.7rem; font-weight: bold; }

        /* Detail-Ansicht */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); display:none; align-items:center; justify-content:center; z-index:20000; padding: 1rem; }
        .modal.active { display:flex; }
        .modal-box { background: var(--bg-surface); width: 100%; max-width: 800px; border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; position: relative; }
        @media (max-width: 700px) { .modal-box { grid-template-columns: 1fr; overflow-y: auto; max-height: 90vh; } }
        .close-x { position: absolute; top: 10px; right: 10px; background: white; color: black; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; z-index: 100; }
        .modal-img { width: 100%; height: 100%; object-fit: cover; min-height: 250px; }
        .modal-text { padding: 2rem; }
        .warning { border: 1px solid var(--accent-red); padding: 15px; margin-top: 20px; color: #ff4444; font-size: 0.85rem; background: rgba(187, 0, 0, 0.05); }

        /* Animationen */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .blink { animation: blink 1s infinite; }
    </style>
</head>
<body>

<div class="scanlines"></div>

<div id="landing-page">
    <div class="terminal-loader">
        <p>> SYTEM_CHECK: OK</p>
        <p>> SECURITY_ENCRYPTION: ACTIVE</p>
        <p>> SOURCE: CLASSIFIED_BIOLAB</p>
        <p>> STATUS: <span class="blink">WAITING...</span></p>
    </div>
    <h1 style="margin-bottom: 3rem; letter-spacing: 10px; font-size: 2rem;">ENTITY LOG</h1>
    <button class="enter-btn" onclick="enterDatabase()">Enter Database</button>
</div>

<div id="main-content">
    <div class="container">
        <header>
            <p style="color: var(--accent-red); font-size: 0.7rem; font-weight: bold; margin-bottom: 0.5rem;">DATABASE_ACCESS // VERSION_2.0.26</p>
            <h1>Specimen Archive</h1>
        </header>

        <nav class="filter-nav">
            <button class="filter-btn active" onclick="filterLogs('ALL', this)">[ ALL ]</button>
            <button class="filter-btn" onclick="filterLogs('HUMANOID', this)">[ HUMANOID ]</button>
            <button class="filter-btn" onclick="filterLogs('ANOMALY', this)">[ ANOMALY ]</button>
            <button class="filter-btn" onclick="filterLogs('PREHISTORIC', this)">[ PREHISTORIC ]</button>
        </nav>

        <div class="grid" id="grid"></div>
    </div>
    <footer style="text-align: center; padding: 2rem; color: #333; font-size: 0.7rem;">END OF LOCAL STORAGE</footer>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <button class="close-x" onclick="closeModal()">X</button>
        <img id="mImg" class="modal-img">
        <div class="modal-text">
            <p id="mID" style="color: var(--accent-red); font-weight: bold; font-size: 0.8rem;"></p>
            <h2 id="mTitle" style="text-transform: uppercase; margin-bottom: 1rem; font-size: 1.8rem;"></h2>
            <p id="mDesc" style="font-size: 0.9rem; color: #ccc; margin-bottom: 1rem;"></p>
            <div class="warning">
                <strong>CONTAINMENT PROTOCOL:</strong><br>
                <span id="mWarn"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const data = [
        { id: "01", name: "The Watcher", cat: "HUMANOID", desc: "Specimen exhibits continuous visual focus. Neural activity remains high.", warn: "Visual contact must not be broken by observer." },
        { id: "02", name: "Smile Unit", cat: "HUMANOID", desc: "Sub-dermal muscle manipulation mimics human joy. Intent: Hostile.", warn: "Do not replicate facial expressions." },
        { id: "03", name: "The Observer", cat: "ANOMALY", desc: "Multiple visual sensors detected. 360-degree awareness field.", warn: "Total darkness required for containment." },
        { id: "04", name: "The Lure", cat: "ANOMALY", desc: "Biological protrusions designed for deception and entrapment.", warn: "Physical proximity prohibited." },
        { id: "05", name: "The Maw", cat: "ANOMALY", desc: "Secondary oral cavity used for rapid matter consumption.", warn: "No organic matter within 10 meters." },
        { id: "06", name: "The Echo", cat: "ANOMALY", desc: "Specimen reacts to auditory stimuli. Movement is sound-dependent.", warn: "Strict silence in Sector 06." },
        { id: "07", name: "The Gaze", cat: "ANOMALY", desc: "Deep-sea ocular entity. Adapted for high-pressure surveillance.", warn: "Do not submerge surveillance units." },
        { id: "08", name: "The Mimic", cat: "HUMANOID", desc: "Advanced behavioral replication. Can impersonate personnel.", warn: "Biometric verification required daily." },
        { id: "09", name: "The Spine", cat: "ANOMALY", desc: "Exposed vertebral structure with independent motor control.", warn: "Neural shock risk on contact." },
        { id: "10", name: "The Primate", cat: "HUMANOID", desc: "Intelligence level matches Class-A scientists. High awareness.", warn: "Minimal verbal interaction allowed." },
        { id: "11", name: "The Sentinel", cat: "ANOMALY", desc: "Statue-like posture. Activates upon undetected movement.", warn: "Never lose visual contact." },
        { id: "12", name: "The Subject", cat: "HUMANOID", desc: "Patient Zero of the 'Smiling Event'. Cognitive hazard.", warn: "Psychological screening mandatory." },
        { id: "13", name: "The Beetle", cat: "PREHISTORIC", desc: "Ancient chitin-armored entity. Living tissue beneath shell.", warn: "High-caliber tools required for inspection." }
    ];

    function enterDatabase() {
        document.getElementById('landing-page').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.body.style.overflow = 'auto'; // Scrollen wieder erlauben
        render('ALL');
    }

    function render(filter) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const filtered = (filter === 'ALL') ? data : data.filter(e => e.cat === filter);
        
        filtered.forEach(e => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${e.id}.jpg.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/300x200/000/333?text=NO+IMAGE'">
                <div class="card-body">
                    <p class="log-tag">LOG // ${e.id}</p>
                    <h3>${e.name}</h3>
                </div>
            `;
            card.onclick = () => openModal(e);
            grid.appendChild(card);
        });
    }

    function filterLogs(cat, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(cat);
    }

    function openModal(e) {
        document.getElementById('mTitle').innerText = e.name;
        document.getElementById('mID').innerText = `DESIGNATION: LOG-${e.id}`;
        document.getElementById('mDesc').innerText = e.desc;
        document.getElementById('mWarn').innerText = e.warn;
        
        const mImg = document.getElementById('mImg');
        const path = (e.id === "01") ? `${e.id}.jpg.jpg` : `${e.id}m.jpg.jpg`;
        mImg.src = path;
        mImg.onerror = () => { mImg.src = `${e.id}.jpg.jpg`; };
        
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }
</script>

</body>
</html>
