<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTITY LOG | Classified Archive</title>
    <style>
        :root {
            --bg-deep: #020202;
            --bg-surface: #0a0a0a;
            --bg-panel: #141414;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-red: #bb0000;
            --border-dim: #333333;
            --font-mono: 'Courier New', Courier, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-sans); line-height: 1.6; overflow-x: hidden; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: 9999; pointer-events: none; opacity: 0.2; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 10; }
        header { padding: 3rem 0 2rem 0; border-bottom: 1px solid var(--border-dim); margin-bottom: 2rem; }
        .sys-badge { display: inline-block; border: 1px solid var(--accent-red); color: #ff3333; padding: 0.4rem 0.8rem; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; background: rgba(139, 0, 0, 0.1); margin-bottom: 1rem; }
        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: -1px; }
        .subtitle { font-family: var(--font-mono); color: var(--text-muted); letter-spacing: 3px; margin-bottom: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 4rem; }
        .card { background: var(--bg-panel); border: 1px solid var(--border-dim); cursor: pointer; transition: 0.3s; overflow: hidden; position: relative; }
        .card:hover { border-color: var(--accent-red); transform: translateY(-3px); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #080808; border-bottom: 1px solid var(--border-dim); }
        .card-content { padding: 1.2rem; }
        .card-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 0.5rem; }
        .log-id { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); }
        .badge { font-family: var(--font-mono); font-size: 0.7rem; padding: 0.2rem 0.5rem; border: 1px solid var(--border-dim); margin-top: 0.5rem; display: inline-block; }
        .threat-high { border-color: var(--accent-red); color: #ff4444; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-surface); border: 1px solid #444; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; position: relative; }
        @media (max-width: 700px) { .modal-content { grid-template-columns: 1fr; } }
        .modal-img { width: 100%; height: auto; display: block; background: #000; }
        .modal-data { padding: 2rem; }
        .warning-box { margin-top: 1.5rem; padding: 1rem; border: 1px solid var(--accent-red); background: rgba(139, 0, 0, 0.1); font-weight: bold; }
        .close-btn { position: absolute; top: 1rem; right: 1rem; background: #fff; color: #000; border: none; padding: 0.5rem 1rem; cursor: pointer; font-family: var(--font-mono); font-weight: bold; z-index: 11; }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border-dim); color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="sys-badge">CLASSIFIED ACCESS</div>
            <h1>Entity Log</h1>
            <div class="subtitle">Biological Specimen Database</div>
        </header>
        <div class="grid" id="entityGrid"></div>
    </div>
    <footer>RECOVERED ARCHIVE // 2026</footer>
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="close">CLOSE</button>
            <img src="" class="modal-img" id="mImg">
            <div class="modal-data">
                <h2 id="mTitle"></h2>
                <p id="mLog" class="subtitle"></p>
                <div id="mDesc" style="margin-top:1rem"></div>
                <div class="warning-box" id="mWarn"></div>
            </div>
        </div>
    </div>
    <script>
        const entities = [
            { id: "01", name: "THE WATCHER", threat: "MEDIUM", desc: "Recovered specimen does not blink. It appears aware of the camera.", warn: "Do not blink back." },
            { id: "02", name: "SMILE UNIT", threat: "HIGH", desc: "Subject mimicking human facial expressions.", warn: "Do not mirror facial behavior." },
            { id: "03", name: "THE OBSERVER", threat: "HIGH", desc: "Multiple ocular structures detected.", warn: "Avoid direct line-of-sight." },
            { id: "04", name: "THE LURE", threat: "MEDIUM", desc: "Specimen extends appendages when observed.", warn: "Maintain distance." },
            { id: "05", name: "THE MAW", threat: "HIGH", desc: "Subject opens a secondary jaw structure.", warn: "No close-range viewing." },
            { id: "06", name: "THE ECHO", threat: "MEDIUM", desc: "Reacts to distant sounds.", warn: "Silence mandatory." },
            { id: "07", name: "THE GAZE", threat: "HIGH", desc: "Deep sea recovery with abnormal eye formation.", warn: "Do not inspect alone." },
            { id: "08", name: "THE MIMIC", threat: "HIGH", desc: "Displays mimic behavior after observation.", warn: "Avoid imitation response." },
            { id: "09", name: "THE SPINE", threat: "HIGH", desc: "External spinal movement recorded.", warn: "Approach prohibited." },
            { id: "10", name: "THE PRIMATE", threat: "HIGH", desc: "Primate specimen with abnormal awareness.", warn: "Rotation recommended." },
            { id: "11", name: "THE SENTINEL", threat: "HIGH", desc: "Antler mutation accelerated growth.", warn: "No eye contact during flare." },
            { id: "12", name: "THE SUBJECT", threat: "MEDIUM", desc: "Abnormal smiling behavior recorded.", warn: "Do not trust the smile." },
            { id: "13", name: "THE BEETLE", threat: "HIGH", desc: "Cranial structure beneath outer shell.", warn: "Do not touch outer layer." }
        ];
        const grid = document.getElementById('entityGrid');
        function render() {
            grid.innerHTML = '';
            entities.forEach(e => {
                const card = document.createElement('div');
                card.className = 'card';
                // Angepasst an deine Dateinamen auf GitHub (.jpg.jpg)
                const imgPath = `${e.id}.jpg.jpg`;
                card.innerHTML = `
                    <img src="${imgPath}" class="card-img" onerror="this.src='https://via.placeholder.com/300x200/111/333?text=LOADING+ERROR'">
                    <div class="card-content">
                        <div class="log-id">LOG // ${e.id}</div>
                        <div class="card-title">${e.name}</div>
                        <span class="badge ${e.threat === 'HIGH' ? 'threat-high' : ''}">${e.threat} THREAT</span>
                    </div>
                `;
                card.onclick = () => {
                    document.getElementById('mTitle').innerText = e.name;
                    document.getElementById('mLog').innerText = `LOG ID: ${e.id}`;
                    document.getElementById('mDesc').innerText = e.desc;
                    document.getElementById('mWarn').innerText = `WARNING: ${e.warn}`;
                    // Mutation Logik mit doppelter Endung
                    const mImgPath = (e.id === "01") ? `${e.id}.jpg.jpg` : `${e.id}m.jpg.jpg`;
                    const mImg = document.getElementById('mImg');
                    mImg.src = mImgPath;
                    mImg.onerror = () => { mImg.src = `${e.id}.jpg.jpg`; };
                    document.getElementById('modal').classList.add('active');
                };
                grid.appendChild(card);
            });
        }
        document.getElementById('close').onclick = () => document.getElementById('modal').classList.remove('active');
        render();
    </script>
</body>
</html>
